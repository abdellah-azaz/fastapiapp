name: Tests

on: 
  push:
    branches: [master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: test_passworddb
          MYSQL_HOST: 127.0.0.1
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install fastapi pytest pytest-cov pytest-asyncio httpx mysql-connector-python passlib bcrypt
      
      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -uroot -pAzaz2003@abdellah --silent; do
            sleep 1
          done
      
      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_NAME: test_passworddb
          TESTING: true
          DISABLE_REALTIME_MONITOR: true
          SKIP_MIGRATION: true
        run: |
          pytest tests_integr/test_conftest_diagnostic.py -v --cov=main --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

